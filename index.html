<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA (crítico para iPhone) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vela" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- iOS splash screens (iPhone 14 Pro / 15) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash-1179x2556.png"
    />

    <!-- SEO / Social -->
    <meta name="description" content="Vela — Tu grupo, tu escudo. Seguridad nocturna para jóvenes en Lima." />
    <meta name="color-scheme" content="dark" />
    <title>Vela 🕯️</title>

    <!-- Fonts: DM Sans desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="dark bg-[#0A0A0F] overscroll-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('Vela SW registrado:', reg.scope))
            .catch((err) => console.error('SW error:', err));
        });
      }
    </script>
  </body>
</html>
